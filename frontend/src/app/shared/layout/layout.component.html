<div class="app-container" [class.sidebar-collapsed]="isCollapsed">
  <aside class="sidebar">
    <div class="logo-section">
      <div class="logo-container" routerLink="/dashboard" style="cursor: pointer;" title="Go to Dashboard">
        <div class="logo-icon">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-svg" style="width: 100%; height: 100%; display: block;">
            <!-- Connecting link paths forming W -->
            <path d="M25 32 L40 68 L50 44 L60 68 L75 32" stroke="url(#logo-glow-gradient)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
            <!-- Node connectors -->
            <circle cx="25" cy="32" r="7" fill="#ffffff" />
            <circle cx="50" cy="44" r="7" fill="#818cf8" />
            <circle cx="75" cy="32" r="7" fill="#38bdf8" />
            
            <defs>
              <linearGradient id="logo-glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="50%" stop-color="#818cf8" />
                <stop offset="100%" stop-color="#38bdf8" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text" *ngIf="!isCollapsed">WLink<span class="logo-dot">.</span></div>
      </div>
      <button class="collapse-toggle" (click)="toggleSidebar()" [title]="isCollapsed ? 'Expand Sidebar' : 'Collapse Sidebar'">
        <i class="bi" [class.bi-chevron-left]="!isCollapsed" [class.bi-chevron-right]="isCollapsed"></i>
      </button>
    </div>

    <nav class="nav-links" *ngIf="user$ | async as user">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Dashboard' : ''">
        <i class="bi bi-speedometer2"></i>
        <span *ngIf="!isCollapsed">Dashboard</span>
      </a>
      <a routerLink="/inbox" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Shared Inbox' : ''">
        <i class="bi bi-chat-dots"></i>
        <span *ngIf="!isCollapsed">Shared Inbox</span>
      </a>
      
      <!-- Admin Only Tools -->
      <ng-container *ngIf="user.role === 'admin' || user.role === 'superadmin'">
        <a routerLink="/broadcasts" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Broadcasts' : ''">
          <i class="bi bi-megaphone"></i>
          <span *ngIf="!isCollapsed">Broadcasts</span>
        </a>
        <a routerLink="/chatbots" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Chatbots' : ''">
          <i class="bi bi-robot"></i>
          <span *ngIf="!isCollapsed">Chatbots</span>
        </a>
      </ng-container>

      <a routerLink="/contacts" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Contacts' : ''">
        <i class="bi bi-people"></i>
        <span *ngIf="!isCollapsed">Contacts</span>
      </a>

      <!-- Admin Only Strategy & Settings -->
      <ng-container *ngIf="user.role === 'admin' || user.role === 'superadmin'">
        <a routerLink="/templates" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Templates' : ''">
          <i class="bi bi-file-earmark-text"></i>
          <span *ngIf="!isCollapsed">Templates</span>
        </a>

        <a routerLink="/settings" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? 'Settings' : ''">
          <i class="bi bi-gear"></i>
          <span *ngIf="!isCollapsed">Settings</span>
        </a>
      </ng-container>
    </nav>

    <div class="user-section" *ngIf="user$ | async as user">
      <div class="user-profile-clickable" routerLink="/settings" title="Account Settings">
        <div class="user-avatar">
          {{ user.name[0] | uppercase }}
        </div>
        <div class="user-info" *ngIf="!isCollapsed">
          <div class="user-name">{{ user.name | titlecase }}</div>
          <div class="user-role">{{ user.role | titlecase }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" [title]="isCollapsed ? 'Logout' : 'Logout'">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-nav">
      <div class="page-title">
        {{ pageTitle }}
      </div>
      <div class="top-actions">
        <!-- Removed Support Button -->

        <!-- Notification Bell & Dropdown Wrapper -->
        <div class="notification-wrapper">
          <button class="notification-trigger" (click)="toggleNotificationDropdown($event)" title="Notifications">
            <i class="bi bi-bell"></i>
            <span class="notification-badge" *ngIf="unreadNotificationsCount > 0">
              {{ unreadNotificationsCount }}
            </span>
          </button>

          <!-- Floating Notification Dropdown Card -->
          <div class="notification-dropdown" *ngIf="showNotificationDropdown" (click)="$event.stopPropagation()">
            <div class="dropdown-header">
              <h4>Notifications</h4>
              <button class="btn-text-action" (click)="markAllAsRead()" *ngIf="unreadNotificationsCount > 0">Mark all as read</button>
            </div>
            <div class="dropdown-body">
              <div class="notification-list" *ngIf="notifications.length > 0; else emptyNotifications">
                <div class="notification-item" *ngFor="let n of notifications" [class.unread]="n.unread" (click)="readNotification(n)">
                  <div class="notification-icon-wrapper" [class]="n.type">
                    <i class="bi" [class]="n.icon"></i>
                  </div>
                  <div class="notification-content">
                    <div class="notification-title-row">
                      <span class="notification-item-title">{{ n.title }}</span>
                      <span class="notification-item-time">{{ n.time }}</span>
                    </div>
                    <p class="notification-item-message">{{ n.message }}</p>
                  </div>
                  <div class="unread-dot" *ngIf="n.unread"></div>
                </div>
              </div>
              <ng-template #emptyNotifications>
                <div class="empty-notifications">
                  <i class="bi bi-bell-slash"></i>
                  <p>All caught up! No new notifications.</p>
                </div>
              </ng-template>
            </div>
            <div class="dropdown-footer">
              <button class="btn-view-all" (click)="clearAllNotifications()">Clear All</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
