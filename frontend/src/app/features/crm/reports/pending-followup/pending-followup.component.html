<div class="report-container" style="display: flex; flex-direction: column; gap: 32px; padding: 24px;">
  
  <!-- Header -->
  <div class="flex justify-between items-center" style="flex-wrap: wrap; gap: 16px;">
    <div>
      <h2 class="fw-bold mb-2" style="color: #1e293b;">Pending Follow-ups</h2>
      <p class="text-muted mb-0" style="font-size: 0.95rem;">Track and manage leads that need attention</p>
    </div>
    <button class="btn btn-primary" style="padding: 10px 24px; border-radius: 12px; font-weight: 600; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); border: none; background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);">
      <i class="bi bi-cloud-download me-2"></i> Export Report
    </button>
  </div>

  <!-- KPI Cards -->
  <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px;">
    
    <div class="stat-card" style="background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid rgba(229, 231, 235, 0.5); display: flex; align-items: center; gap: 20px;">
      <div class="stat-icon icon-red" style="width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #fef2f2; color: #ef4444;">
        <i class="bi bi-exclamation-octagon"></i>
      </div>
      <div class="stat-info">
        <label style="color: #64748b; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px;">Overdue</label>
        <h3 style="color: #0f172a; font-size: 1.75rem; font-weight: 800; margin: 0;">12</h3>
      </div>
    </div>

    <div class="stat-card" style="background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid rgba(229, 231, 235, 0.5); display: flex; align-items: center; gap: 20px;">
      <div class="stat-icon icon-orange" style="width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #fff7ed; color: #f97316;">
        <i class="bi bi-calendar-event"></i>
      </div>
      <div class="stat-info">
        <label style="color: #64748b; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px;">Due Today</label>
        <h3 style="color: #0f172a; font-size: 1.75rem; font-weight: 800; margin: 0;">28</h3>
      </div>
    </div>

    <div class="stat-card" style="background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid rgba(229, 231, 235, 0.5); display: flex; align-items: center; gap: 20px;">
      <div class="stat-icon icon-blue" style="width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #eff6ff; color: #3b82f6;">
        <i class="bi bi-calendar2-week"></i>
      </div>
      <div class="stat-info">
        <label style="color: #64748b; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px;">Upcoming (7 Days)</label>
        <h3 style="color: #0f172a; font-size: 1.75rem; font-weight: 800; margin: 0;">45</h3>
      </div>
    </div>

  </div>

  <!-- Data Table -->
  <div class="chart-card" style="background: white; border-radius: 24px; box-shadow: 0 4px 12px -4px rgba(17, 24, 39, 0.05); border: 1px solid rgba(229, 231, 235, 0.8); overflow: hidden;">
    <div class="flex justify-between items-center" style="padding: 24px 32px; border-bottom: 1px solid #f1f5f9; flex-wrap: wrap; gap: 16px;">
      <h5 class="fw-bold mb-0" style="color: #1e293b; font-size: 1.15rem;">Follow-up List</h5>
      
      <div class="flex gap-2" style="gap: 10px;">
         <input type="text" [(ngModel)]="searchTerm" class="form-control" placeholder="Search leads or assignees..." style="border-radius: 12px; padding: 8px 16px; border: 1px solid #e2e8f0; font-size: 0.9rem; min-width: 250px;">
      </div>
    </div>
    
    <div class="table-responsive p-0">
      <table style="width: 100%; border-collapse: collapse; text-align: left; min-width: 900px;">
        <thead>
          <tr style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
            <th style="padding: 16px 32px; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Lead Name</th>
            <th style="padding: 16px 20px; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Contact</th>
            <th style="padding: 16px 20px; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Phone</th>
            <th style="padding: 16px 20px; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Due Date</th>
            <th style="padding: 16px 20px; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Assignee</th>
            <th style="padding: 16px 32px; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; text-align: right;">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let f of filteredFollowups; let last = last" [ngStyle]="{'border-bottom': last ? 'none' : '1px solid #f1f5f9'}" style="transition: background 0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
            <td style="padding: 20px 32px;">
              <div style="font-weight: 700; color: #1e293b; font-size: 0.95rem;">
                {{ f.leadName }}
              </div>
            </td>
            <td style="padding: 20px 20px; color: #475569; font-size: 0.95rem;">
              {{ f.contact }}
            </td>
            <td style="padding: 20px 20px; color: #475569; font-size: 0.95rem;">
              {{ f.phone }}
            </td>
            <td style="padding: 20px 20px; font-weight: 600; color: #334155; font-size: 0.95rem;">
              {{ f.dueDate }}
            </td>
            <td style="padding: 20px 20px;">
              <div style="font-weight: 600; color: #3b82f6; font-size: 0.95rem;">
                {{ f.assignee }}
              </div>
            </td>
            <td style="padding: 20px 32px; text-align: right;">
              <span [ngClass]="getStatusClass(f.status)" style="font-size: 0.8rem; font-weight: 600;">
                {{ f.status }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
