<div class="ctwa-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 style="font-size: 1.25rem; font-weight: 700;">Click to WhatsApp Links</h2>
      <p class="text-muted small mb-0">Create links and QR codes for your ads and marketing materials</p>
    </div>
    <button class="btn btn-primary"><i class="bi bi-link-45deg"></i> Create Link</button>
  </div>

  <div class="link-list">
    <div *ngFor="let link of links" class="link-card">
      <div class="d-flex gap-3 align-items-center">
        <div class="qr-placeholder">
          <i class="bi bi-qr-code"></i>
        </div>
        <div>
          <div style="font-weight: 700; font-size: 1rem;">{{ link.name }}</div>
          <div class="text-primary small">wa.me/{{ link.shortCode }}</div>
          <div class="text-muted small mt-1">"{{ link.message }}"</div>
        </div>
      </div>
      <div class="text-end">
        <div class="d-flex gap-4 mb-2">
          <div class="text-center">
            <div class="small text-muted">Clicks</div>
            <div style="font-weight: 700;">{{ link.clicks }}</div>
          </div>
          <div class="text-center">
            <div class="small text-muted">Conv.</div>
            <div style="font-weight: 700;">{{ link.conversions }}</div>
          </div>
        </div>
        <button class="btn btn-sm btn-outline-secondary">Copy Link</button>
      </div>
    </div>
  </div>
</div>
