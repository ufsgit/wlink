<div class="ctwa-page">
  <!-- Page Header -->
  <div class="page-header d-flex justify-content-between align-items-center mb-4" style="display: flex !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; width: 100% !important;">
    <div>
      <h2 style="font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.02em;">Click to WhatsApp Links</h2>
      <p class="text-muted mt-1 mb-0">Create links and QR codes for your ads and marketing materials</p>
    </div>
    <button class="btn btn-primary px-4 py-2 shadow-sm" style="border-radius: 12px; font-weight: 700; background: linear-gradient(135deg, #6366F1, #4F46E5); border: none;">
      <i class="bi bi-link-45deg me-2"></i> Create Link
    </button>
  </div>

  <!-- Click to WhatsApp Links Cards List -->
  <div class="link-list">
    <div *ngFor="let link of links" class="link-card">
      <div class="d-flex gap-4 align-items-center">
        <!-- Scan QR Placeholder Badge -->
        <div class="qr-placeholder shadow-sm">
          <i class="bi bi-qr-code"></i>
          <span style="font-size: 0.58rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px;">Scan QR</span>
        </div>
        
        <!-- Link details -->
        <div>
          <div style="font-weight: 800; font-size: 1.1rem; color: #0f172a; letter-spacing: -0.01em; margin-bottom: 6px;">{{ link.name }}</div>
          
          <div class="d-flex align-items-center gap-2 mb-2">
            <div class="shortcode-badge shadow-sm">
              <i class="bi bi-link-45deg me-1"></i> wa.me/{{ link.shortCode }}
            </div>
          </div>
          
          <!-- Mini WhatsApp pre-filled message quote card -->
          <div class="msg-quote">
            <i class="bi bi-chat-quote-fill me-1 text-success" style="opacity: 0.8; font-size: 0.9rem;"></i>
            "{{ link.message }}"
          </div>
        </div>
      </div>
      
      <!-- Statistics and actions -->
      <div class="text-end d-flex flex-column align-items-end gap-3">
        <div class="d-flex gap-3">
          <div class="stat-badge-widget shadow-sm clicks-widget">
            <i class="bi bi-mouse3-fill"></i>
            <div>
              <label>Clicks</label>
              <span>{{ link.clicks }}</span>
            </div>
          </div>
          
          <div class="stat-badge-widget shadow-sm conv-widget">
            <i class="bi bi-arrow-repeat"></i>
            <div>
              <label>Conversions</label>
              <span>{{ link.conversions }}</span>
            </div>
          </div>
        </div>
        
        <button class="btn btn-copy shadow-sm">
          <i class="bi bi-clipboard-plus me-1"></i> Copy Link
        </button>
      </div>
    </div>
  </div>
</div>
