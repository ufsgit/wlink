<div class="analytics-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 style="font-size: 1.25rem; font-weight: 700;">Business Analytics</h2>
      <p class="text-muted small mb-0">Deep insights into your communication and conversions</p>
    </div>
    <div class="d-flex gap-2">
      <select class="form-select form-select-sm">
        <option>Last 30 Days</option>
        <option>Last 7 Days</option>
        <option>Custom Range</option>
      </select>
      <button class="btn btn-outline-primary btn-sm"><i class="bi bi-download"></i> Export</button>
    </div>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <label>Messages Sent</label>
      <div class="value">128,450</div>
    </div>
    <div class="metric-card">
      <label>Open Rate</label>
      <div class="value">84.2%</div>
    </div>
    <div class="metric-card">
      <label>Click Rate</label>
      <div class="value">22.5%</div>
    </div>
    <div class="metric-card">
      <label>Revenue Generated</label>
      <div class="value">₹12,45,000</div>
    </div>
  </div>

  <div class="chart-placeholder">
    <div class="text-center">
      <i class="bi bi-bar-chart-line" style="font-size: 3rem; opacity: 0.1;"></i>
      <p class="mt-2">Engagement Over Time</p>
    </div>
  </div>

  <div class="table-section">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Campaign Name</th>
          <th>Sent</th>
          <th>Delivered</th>
          <th>Read</th>
          <th>Conversion</th>
        </tr>
      </thead>
      <tbody style="font-size: 0.9rem;">
        <tr>
          <td>Summer Sale 2024</td>
          <td>10,000</td>
          <td>9,920</td>
          <td>8,450</td>
          <td>4.2%</td>
        </tr>
        <tr>
          <td>New Arrival SMS</td>
          <td>5,000</td>
          <td>4,850</td>
          <td>N/A</td>
          <td>2.1%</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
