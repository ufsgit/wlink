<div class="drip-page">
  <div class="workflow-header">
    <div>
      <h2 style="font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.02em;">Automated Workflows</h2>
      <p class="text-muted mt-1 mb-0">Multi-channel drip campaigns that engage customers at every touchpoint.</p>
    </div>
    <button class="btn btn-primary px-4 py-2 shadow-sm" style="border-radius: 12px; font-weight: 700; background: linear-gradient(135deg, #6366F1, #4F46E5); border: none;">
      <i class="bi bi-plus-lg me-2"></i> Create Workflow
    </button>
  </div>

  <div class="sequence-list">
    <div *ngFor="let seq of sequences" class="sequence-card" [class.seq-draft]="seq.status === 'Draft'" [class.seq-active]="seq.status === 'Active'">
      <div class="seq-info">
        <div class="trigger-tag mb-3">
          <i class="bi bi-lightning-fill"></i> Trigger: {{ seq.trigger }}
        </div>
        <h4 style="font-weight: 800; color: #0f172a; margin-bottom: 8px; letter-spacing: -0.01em;">{{ seq.name }}</h4>
        
        <!-- Workflow Drip Path Node Visuals -->
        <div class="visual-steps">
          <ng-container *ngFor="let step of seq.steps; let i = index; let last = last">
            <div class="step-node shadow-sm" [class.active]="step.active" [class.delay-node]="step.type === 'delay'" [class.action-node]="step.type !== 'delay'" [title]="step.type">
              <i class="bi" [class.bi-chat-left-text-fill]="step.type === 'message'" 
                           [class.bi-clock-fill]="step.type === 'delay'"
                           [class.bi-envelope-fill]="step.type === 'email'"
                           [class.bi-telephone-fill]="step.type === 'ivr'"></i>
            </div>
            <div class="step-connector" *ngIf="!last" [class.connector-active]="step.active"></div>
          </ng-container>
        </div>
      </div>

      <!-- Stats and Control Side -->
      <div class="seq-stats">
        <div class="stat-group">
          <div class="stat-item">
            <label>In Progress</label>
            <span>{{ seq.inProgress }}</span>
          </div>
          <div class="stat-item">
            <label>Completed</label>
            <span>{{ seq.completed }}</span>
          </div>
        </div>
        <div class="d-flex align-items-center justify-content-end gap-3 mt-1">
          <span class="badge-status" [class.active]="seq.status === 'Active'" [class.draft]="seq.status === 'Draft'">
            <i class="bi bi-circle-fill" style="font-size: 0.35rem;"></i>
            {{ seq.status }}
          </span>
          <button class="btn btn-manage shadow-sm">
            Manage <i class="bi bi-chevron-right ms-1" style="font-size: 0.65rem;"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
