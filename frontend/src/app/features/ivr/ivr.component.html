<div class="ivr-page">
  <!-- Page Header -->
  <div class="page-header d-flex justify-content-between align-items-center mb-4" style="display: flex !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; width: 100% !important;">
    <div>
      <h2 style="font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.02em;">Smart IVR Flows</h2>
      <p class="text-muted mt-1 mb-0">Automate your voice calls with intelligent routing</p>
    </div>
    <button class="btn btn-primary px-4 py-2 shadow-sm" style="border-radius: 12px; font-weight: 700; background: linear-gradient(135deg, #6366F1, #4F46E5); border: none;">
      <i class="bi bi-telephone-plus-fill me-2"></i> Design Flow
    </button>
  </div>

  <!-- IVR Flow Cards Grid -->
  <div class="ivr-grid">
    <div *ngFor="let flow of flows" class="ivr-card" [class.active-flow]="flow.active" [class.paused-flow]="!flow.active">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <h4 style="font-size: 1.15rem; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.01em;">{{ flow.name }}</h4>
        <span class="badge-status" [class.active]="flow.active" [class.paused]="!flow.active">
          <i class="bi bi-circle-fill" style="font-size: 0.35rem;"></i>
          {{ flow.active ? 'Active' : 'Paused' }}
        </span>
      </div>
      <div style="font-size: 0.8rem; font-weight: 600; color: #94a3b8; margin-bottom: 20px;">
        <i class="bi bi-hash me-1"></i> DID: {{ flow.number }}
      </div>
      
      <!-- Micro IVR flowchart tree visualizer -->
      <div class="flow-preview-tree">
        <div class="flow-tree-line"></div>
        
        <div class="flow-step">
          <div class="step-dot audio-step shadow-sm">
            <i class="bi bi-volume-up-fill"></i>
          </div>
          <div>
            <div class="step-label">Welcome Audio</div>
            <div class="step-sub">Playback audio greeting</div>
          </div>
        </div>
        
        <div class="flow-step">
          <div class="step-dot key-step shadow-sm">
            <i class="bi bi-1-square-fill"></i>
          </div>
          <div>
            <div class="step-label">Key 1: Sales</div>
            <div class="step-sub">Forward call to SALES group</div>
          </div>
        </div>
        
        <div class="flow-step">
          <div class="step-dot key-step shadow-sm">
            <i class="bi bi-2-square-fill"></i>
          </div>
          <div>
            <div class="step-label">Key 2: Support</div>
            <div class="step-sub">Redirect caller to chatbot flow</div>
          </div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="mt-4 d-flex gap-2">
        <button class="btn btn-edit flex-grow-1 shadow-sm">Edit Flow</button>
        <button class="btn btn-logs shadow-sm">
          <i class="bi bi-journal-text me-1"></i> Logs
        </button>
      </div>
    </div>
  </div>
</div>
