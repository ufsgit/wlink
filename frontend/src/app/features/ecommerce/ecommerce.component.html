<div class="ecommerce-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 style="font-size: 1.25rem; font-weight: 700;">Catalog & Inventory</h2>
      <p class="text-muted small mb-0">Manage products and WhatsApp orders</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm">Sync WooCommerce</button>
      <button class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Add Product</button>
    </div>
  </div>

  <div class="product-grid">
    <div *ngFor="let prod of products" class="product-card">
      <div class="product-img">
        <i class="bi bi-box-seam"></i>
      </div>
      <div class="product-info">
        <div class="product-name">{{ prod.name }}</div>
        <div class="product-price">₹{{ prod.price }}</div>
        <div class="inventory">Stock: {{ prod.stock }} units</div>
      </div>
    </div>
  </div>

  <div class="mt-5">
    <h3 style="font-size: 1rem; font-weight: 700; margin-bottom: 16px;">Recent Orders</h3>
    <table class="table table-sm" style="font-size: 0.85rem;">
      <thead class="table-light">
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>#ORD-9921</td>
          <td>John Doe</td>
          <td>₹1,450.00</td>
          <td><span class="badge bg-success">Delivered</span></td>
          <td>Today, 10:30 AM</td>
        </tr>
        <tr>
          <td>#ORD-9920</td>
          <td>Alice Smith</td>
          <td>₹2,100.00</td>
          <td><span class="badge bg-warning text-dark">Pending</span></td>
          <td>Yesterday</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
