<div class="ecommerce-page">
  <!-- Page Header -->
  <div class="page-header d-flex justify-content-between align-items-center mb-4" style="display: flex !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; width: 100% !important;">
    <div>
      <h2 style="font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.02em;">Catalog & Inventory</h2>
      <p class="text-muted mt-1 mb-0">Manage products and WhatsApp orders</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-light shadow-sm fw-bold px-4 py-2" style="border-radius: 12px; border: 1px solid #e2e8f0; font-size: 0.85rem;">
        Sync WooCommerce
      </button>
      <button class="btn btn-primary px-4 py-2 shadow-sm" style="border-radius: 12px; font-weight: 700; background: linear-gradient(135deg, #6366F1, #4F46E5); border: none; font-size: 0.85rem;">
        <i class="bi bi-plus-lg me-2"></i> Add Product
      </button>
    </div>
  </div>

  <!-- Product Grid -->
  <div class="product-grid">
    <div *ngFor="let prod of products" class="product-card">
      <div class="product-img">
        <i class="bi bi-box-seam"></i>
      </div>
      <div class="product-info">
        <div class="product-name">{{ prod.name }}</div>
        <div class="product-price">₹{{ prod.price }}</div>
        <div class="inventory-badge">
          <span class="inventory">Stock: {{ prod.stock }} units</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent Orders Table Section -->
  <div class="table-section">
    <h3 class="section-title">Recent Orders</h3>
    <div class="table-container shadow-sm">
      <table class="data-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="fw-bold" style="color: #4f46e5;">#ORD-9921</td>
            <td class="fw-semibold">John Doe</td>
            <td class="fw-bold text-dark">₹1,450.00</td>
            <td>
              <span class="badge-status delivered">
                <i class="bi bi-circle-fill" style="font-size: 0.35rem;"></i> Delivered
              </span>
            </td>
            <td class="text-secondary">Today, 10:30 AM</td>
          </tr>
          <tr>
            <td class="fw-bold" style="color: #4f46e5;">#ORD-9920</td>
            <td class="fw-semibold">Alice Smith</td>
            <td class="fw-bold text-dark">₹2,100.00</td>
            <td>
              <span class="badge-status pending">
                <i class="bi bi-circle-fill" style="font-size: 0.35rem;"></i> Pending
              </span>
            </td>
            <td class="text-secondary">Yesterday</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
